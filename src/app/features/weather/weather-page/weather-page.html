<main
  class="min-h-screen flex items-center justify-center bg-gradient-to-br from-sky-100 to-blue-200 dark:from-gray-950 dark:to-gray-900 transition-colors duration-300"
>
  <section
    class="w-full max-w-md p-6 space-y-6 rounded-2xl shadow-xl bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300"
  >
    <!-- Header -->
    <div class="flex items-center justify-between">
      <h1 class="text-2xl font-semibold flex items-center gap-2">🌤 Weather App</h1>
      <div class="flex bg-gray-200 dark:bg-gray-700 rounded-lg p-1 text-sm">
  <button id="setTempUnitC" aria-label="setTempUnitC"
    (click)="weatherService.setTempUnit('C')"
    class="px-3 py-1 rounded-md"
    [class.bg-white]="weatherService.temperatureUnit() === 'C'"
    [class.dark:bg-gray-900]="weatherService.temperatureUnit() === 'C'"
  >
    °C
  </button>

  <button id="setTempUnitF" aria-label="setTempUnitF"
    (click)="weatherService.setTempUnit('F')"
    class="px-3 py-1 rounded-md"
    [class.bg-white]="weatherService.temperatureUnit() === 'F'"
    [class.dark:bg-gray-900]="weatherService.temperatureUnit() === 'F'"
  >
    °F
  </button>
</div>
      <app-dark-mode-toggle />
    </div>
    <app-weather-search />

    @if (this.weatherService.loading()) {
      <app-weather-skeleton />
      <app-forecast-skeleton />
    } @else if (weatherService.error()) {
      <p class="text-center text-red-500 dark:text-red-400">
        {{ weatherService.error() }}
      </p>
    } @else {
      <app-weather-card [weather]="weatherService.currentWeather()" />
      <app-forecast-card [forecast]="weatherService.forecast()" />
    }
  </section>
</main>
